<script>
let bills = [];
let filteredBills = [];
let expandedIndex = null;

// LOAD DATA
window.onload = async () => {
    const res = await fetch('/api/bills/');
    bills = await res.json();
    filteredBills = bills;
    renderBills();
};

// SCORE CALCULATION
function calculateScore(b) {
    const status = Number(b.status);
    const base = getProbability(status);

    const impact = Math.min(90, base + 20);
    const penalty = Math.min(85, base + 15);
    const urgency = Math.min(80, base + 10);
    const relevance = Math.min(70, base);

    const total = Math.round((impact + penalty + urgency + relevance) / 4);

    return { impact, penalty, urgency, relevance, total };
}

// RENDER
function renderBills() {
    const container = document.getElementById('mainContent');

    if (!filteredBills.length) {
        container.innerHTML = "<p style='padding:20px'>No bills found</p>";
        return;
    }

    let html = "<div class='bills-grid'>";

    filteredBills.forEach((b, index) => {
        const status = Number(b.status);
        const score = calculateScore(b);

        html += `
        <div class="bill-card ${expandedIndex === index ? 'expanded' : ''}" 
             onclick="toggleCard(${index})">

            <div class="bill-number">${b.bill_number} (${b.state})</div>
            <div class="bill-title">${b.title}</div>

            <div class="bill-meta">
                <span class="status-badge status-${status}">
                    ${getStatus(status)}
                </span><br>
                Date: ${b.last_action_date || 'N/A'}
            </div>

            <!-- ✅ IMPACT SHOWN BEFORE EXPAND -->
            <div style="margin-top:8px; font-size:13px;">
                <b>Impact:</b> ${score.impact}
            </div>

            <!-- ✅ RENAMED -->
            <div class="likelihood">
                <small><b>Passing Probability: ${getProbability(status)}%</b></small>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:${getProbability(status)}%"></div>
                </div>
            </div>

            <div class="bill-details">
                <hr>

                <b>Priority Score:</b> 
                <span style="color:${score.total > 80 ? 'red' : 'orange'}">
                    ${score.total} 🔴
                </span> (RCO)

                <div class="score-section">

                    <div class="score-row">Impact <span>${score.impact}</span></div>
                    <div class="bar"><div class="fill" style="width:${score.impact}%"></div></div>

                    <div class="score-row">Penalty <span>${score.penalty}</span></div>
                    <div class="bar"><div class="fill" style="width:${score.penalty}%"></div></div>

                    <div class="score-row">Urgency <span>${score.urgency}</span></div>
                    <div class="bar"><div class="fill" style="width:${score.urgency}%"></div></div>

                    <div class="score-row">Relevance <span>${score.relevance}</span></div>
                    <div class="bar"><div class="fill" style="width:${score.relevance}%"></div></div>

                </div>

                <div class="explanation">
                    <b>Explanation:</b><br>
                    - Applies to ${b.state}<br>
                    - Status: ${getStatus(status)}<br>
                    - Likely compliance impact<br>
                </div>

                <div class="action-buttons">
                    <button class="assign">Assign Owner</button>
                    <button class="task">Create Task</button>
                    <button class="review">Mark Reviewed</button>
                </div>

            </div>
        </div>`;
    });

    html += "</div>";
    container.innerHTML = html;
}

// TOGGLE
function toggleCard(index) {
    expandedIndex = expandedIndex === index ? null : index;
    renderBills();
}

// SEARCH
function searchBills() {
    const query = document.getElementById("searchInput").value.toLowerCase();

    filteredBills = bills.filter(b =>
        (b.title || "").toLowerCase().includes(query) ||
        (b.bill_number || "").toLowerCase().includes(query)
    );

    expandedIndex = null;
    renderBills();
}

// FILTER
function filterBills() {
    const state = document.getElementById("stateFilter").value;
    const status = document.getElementById("statusFilter").value;

    filteredBills = bills.filter(b => {
        return (!state || b.state === state) &&
               (!status || Number(b.status) == Number(status));
    });

    expandedIndex = null;
    renderBills();
}

// STATUS TEXT
function getStatus(status) {
    const map = {
        1: "Prefiled",
        2: "Introduced",
        3: "Engrossed",
        4: "Enrolled",
        5: "Passed"
    };
    return map[status] || "Unknown";
}

// ✅ RENAMED FUNCTION
function getProbability(status) {
    const map = {
        1: 20,
        2: 40,
        3: 65,
        4: 85,
        5: 100
    };
    return map[status] || 0;
}
</script>
